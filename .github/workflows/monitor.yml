name: Monitor

on:
  repository_dispatch:
    types: [tick]
  workflow_dispatch: {}   # permite rulare manuala pentru test

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verifica fereastra orara
        id: gate
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import datetime, os
          from zoneinfo import ZoneInfo
          now = datetime.datetime.now(ZoneInfo("Europe/Madrid")).time()
          manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          in_win = now >= datetime.time(17, 55) or now <= datetime.time(5, 0)
          print("run=" + ("true" if (manual or in_win) else "false"))
          EOF

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          pip install --quiet playwright requests
          playwright install --with-deps chromium

      - name: Run monitor
        if: steps.gate.outputs.run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: python monitor.py

      - name: Save state
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "update state [skip ci]"
            git pull --rebase -X theirs origin main || true
            git push
          fi
