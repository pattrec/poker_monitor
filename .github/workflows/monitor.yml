name: Monitor

on:
  schedule:
    # Cron in UTC. Acopera fereastra de seara; scriptul verifica singur
    # intervalul exact si iese daca e in afara lui.
    - cron: '*/15 17-23 * * *'
    - cron: '*/15 0-4 * * *'
  workflow_dispatch: {}   # permite rulare manuala pentru test

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --quiet playwright requests
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
        run: python monitor.py

      - name: Save state
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet; then
            git commit -m "update state [skip ci]"
            git push
          fi
